<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICA Tip Credit Calculator — NorthCoast System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root {
 --navy: #1e2d4a;
 --navy-light: #253761;
 --navy-dark: #141e33;
 --gold: #c8922a;
 --gold-light: #e0a830;
 --gold-pale: #fdf3e3;
 --red: #e05a3a;
 --gray-bg: #f0f2f6;
 --white: #ffffff;
 --text-dark: #1a1a2e;
 --text-mid: #4a5568;
 --text-light: #8896a4;
 --border: #e2e6ed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; color: var(--text-dark); background: var(--gray-bg); line-height: 1.6; }

/* NAV */
nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
.logo { font-weight: 600; font-size: 20px; color: var(--navy); }
.logo span { color: var(--red); }
.nav-right { font-size: 13px; color: var(--text-mid); }
.nav-right strong { color: var(--navy); }

/* HERO */
.hero { padding: 52px 2rem 56px; text-align: center; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 5vw, 48px); font-weight: 800; color: var(--navy); margin-bottom: 8px; line-height: 1.2; }
.hero h1 .gold { color: var(--gold); }
.hero .sub { font-size: 16px; color: var(--text-mid); margin-bottom: 32px; }

/* CALC CARD */
.calc-card { background: var(--white); border-radius: 16px; max-width: 580px; margin: 0 auto; box-shadow: 0 4px 24px rgba(30,45,74,0.10); overflow: hidden; }
.calc-inputs { padding: 32px 32px 24px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-mid); margin-bottom: 5px; }
.field input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text-dark); background: var(--white); transition: border-color .15s; }
.field input:focus { outline: none; border-color: var(--navy); }
.calc-btn { width: 100%; padding: 15px; background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; transition: background .15s; }
.calc-btn:hover { background: var(--navy-light); }
.trust-row { display: flex; justify-content: center; gap: 24px; margin-top: 14px; flex-wrap: wrap; }
.trust-item { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 5px; }
.trust-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
</style>
</head>
<body>
<nav>
  <div class="logo">NorthCoast<span>.</span></div>
  <div class="nav-right">Questions? <strong>hello@northcoastsystem.com</strong></div>
</nav>

<section class="hero">
  <h1>Calculate Your <span class="gold">FICA Tip Credit</span></h1>
  <p class="sub">See how much your restaurant could recover in 60 seconds</p>
  
  <div class="calc-card">
    <div class="calc-inputs">
      <div class="field-grid">
        <div class="field">
          <label>Annual Payroll</label>
          <input type="number" id="payroll" placeholder="e.g. 500000">
        </div>
        <div class="field">
          <label>Tipped Employees</label>
          <input type="number" id="employees" placeholder="e.g. 15">
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">Calculate My Recovery</button>
      <div class="trust-row">
        <div class="trust-item"><span class="trust-dot"></span> Free estimate</div>
        <div class="trust-item"><span class="trust-dot"></span> No obligation</div>
        <div class="trust-item"><span class="trust-dot"></span> Confidential</div>
      </div>
    </div>
  </div>
</section>

<script>
function calculate() {
  const payroll = parseFloat(document.getElementById('payroll').value) || 0;
  const employees = parseInt(document.getElementById('employees').value) || 0;
  
  if (payroll <= 0 || employees <= 0) {
    alert('Please enter valid numbers for both fields');
    return;
  }
  
  // FICA Tip Credit calculation (simplified)
  const estimatedCredit = payroll * 0.0765 * 0.15; // Approximate 15% of FICA taxes
  
  alert(`Estimated Annual FICA Tip Credit: $${estimatedCredit.toLocaleString('en-US', {maximumFractionDigits: 0})}\n\nA NorthCoast specialist will contact you with a detailed analysis.`);
}
</script>
</body>
</html>
